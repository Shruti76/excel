# Configuration for Boot Not Suit Analysis Pipeline

## Analysis Settings

# Number of months to look back for recent visits (exclude sites visited within this period)
MONTHS_BACK_FOR_EXCLUSION=3

# Whether to exclude critical/high-risk sites
EXCLUDE_CRITICAL_SITES=true

# Sites per team member
SITES_PER_PERSON=2

# Sites per safety influencer
SITES_PER_INFLUENCER=4

## Team Formation Settings

# Minimum team size
MIN_TEAM_SIZE=2

# Maximum team size
MAX_TEAM_SIZE=3

# Rotate team composition monthly to ensure variety
ROTATE_TEAMS_MONTHLY=true

## Time Limits

# Default time limit for maintenance activities
MAINTENANCE_TIME_LIMIT=full_day

# For project activities (leave as TBC for team coordination)
PROJECT_TIME_LIMIT=TBC

## Risk Management

# Risk level threshold for exclusion (high, medium, low)
CRITICAL_RISK_THRESHOLD=high

# Tower types to prioritize
PRIORITY_TOWER_TYPES=Rooftop,Greenfield

# Activities requiring special considerations
HIGH_RISK_ACTIVITIES=rooftop_installation,high_altitude_work,emergency_response

## Data Quality Settings

# Minimum required data completeness percentage
DATA_COMPLETENESS_THRESHOLD=90

# Validate site IDs format
VALIDATE_SITE_ID_FORMAT=true

# Allow duplicate sites in schedule
ALLOW_DUPLICATE_SITES=false

## Output Settings

# Generate PDF report in addition to Excel
GENERATE_PDF_REPORT=true

# Generate charts/visualizations
GENERATE_VISUALIZATIONS=true

# Include audit trail in report
INCLUDE_AUDIT_TRAIL=true

## Notifications

# Send email on completion
SEND_EMAIL_NOTIFICATION=false

# Slack notification webhook URL
SLACK_WEBHOOK_URL=

# Include report summary in notification
INCLUDE_SUMMARY_IN_NOTIFICATION=true

## Logging

# Log level (DEBUG, INFO, WARNING, ERROR)
LOG_LEVEL=INFO

# Archive old logs
ARCHIVE_LOGS=true

# Log retention days
LOG_RETENTION_DAYS=30

## Performance

# Maximum rows to process per batch
BATCH_SIZE=1000

# Enable parallel processing
ENABLE_PARALLEL_PROCESSING=true

# Number of parallel workers
PARALLEL_WORKERS=4

## Compliance & Audit

# Enable detailed audit logging
ENABLE_AUDIT_LOG=true

# Include team member details in compliance report
INCLUDE_COMPLIANCE_DETAILS=true

# Data retention policy (days)
DATA_RETENTION_DAYS=90

# Anonymize personal data
ANONYMIZE_PERSONAL_DATA=false
