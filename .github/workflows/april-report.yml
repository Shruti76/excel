name: April Site Visit Calendar Generation

on:
  workflow_dispatch:
    inputs:
      site_master:
        description: 'Site Master file (e.g., Colo_Sonatel-APS.xlsx)'
        required: true
        type: string
      hts_calendar:
        description: 'HTS Calendar file (e.g., HTS Site Visits Calendar.xlsx)'
        required: true
        type: string
      pm_assignments:
        description: 'PM Assignments file (e.g., PM_ZONE1_2.xlsx)'
        required: true
        type: string
      project_sites:
        description: 'Project Sites file (e.g., Project sites BNS plan.xlsx)'
        required: true
        type: string
      critical_sites:
        description: 'Critical Sites file (e.g., RT High Risk List.xlsx)'
        required: true
        type: string
      output_name:
        description: 'Output report filename'
        required: false
        type: string
        default: 'HT_Site_Visit_Calendar_April_2026.xlsx'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      file_paths: ${{ steps.files.outputs.paths }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
          token: ${{ github.token }}
          clean: true

      - name: Verify checkout is latest version
        run: |
          echo "🔍 Verifying checkout..."
          echo "Current branch: $(git branch --show-current)"
          echo "Latest commit: $(git log -1 --oneline)"
          echo "Latest tag: $(git describe --tags --always)"
          echo ""
          echo "📁 Repository structure:"
          ls -lah
          echo ""
          echo "📁 Data directory contents:"
          ls -lah data/ || echo "No data directory"
          echo ""
          echo "📁 Data/uploads directory contents:"
          ls -lah data/uploads/ || echo "No data/uploads directory"

      - name: Create directories
        run: |
          mkdir -p data/uploads
          mkdir -p output
          mkdir -p data

      - name: Verify input files exist in repository
        run: |
          echo "🔍 Checking for input files in repository..."
          
          # Create uploads directory if it doesn't exist
          mkdir -p data/uploads
          
          # Function to check and copy file
          check_and_copy() {
            local filename=$1
            local description=$2
            
            if [ -f "data/$filename" ]; then
              echo "✅ Found: data/$filename"
              cp "data/$filename" "data/uploads/"
            elif [ -f "data/uploads/$filename" ]; then
              echo "✅ Found: data/uploads/$filename"
            else
              echo "⚠️  $description not found in data/ or data/uploads/"
              find . -name "$filename" -type f 2>/dev/null || echo "File not found anywhere"
            fi
          }
          
          check_and_copy "${{ github.event.inputs.site_master }}" "Site Master"
          check_and_copy "${{ github.event.inputs.hts_calendar }}" "HTS Calendar"
          check_and_copy "${{ github.event.inputs.pm_assignments }}" "PM Assignments"
          check_and_copy "${{ github.event.inputs.project_sites }}" "Project Sites"
          check_and_copy "${{ github.event.inputs.critical_sites }}" "Critical Sites"
          
          echo ""
          echo "📁 Files in data/uploads after verification:"
          ls -lh data/uploads/ || echo "Directory is empty"

      - name: Store file paths
        id: files
        run: |
          echo "paths={\"site_master\":\"data/uploads/${{ github.event.inputs.site_master }}\",\"hts_calendar\":\"data/uploads/${{ github.event.inputs.hts_calendar }}\",\"pm_assignments\":\"data/uploads/${{ github.event.inputs.pm_assignments }}\",\"project_sites\":\"data/uploads/${{ github.event.inputs.project_sites }}\",\"critical_sites\":\"data/uploads/${{ github.event.inputs.critical_sites }}\"}" >> $GITHUB_OUTPUT

  generate_report:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
          token: ${{ github.token }}
          clean: true

      - name: Verify checkout is latest version
        run: |
          echo "🔍 Verifying checkout in generate_report job..."
          echo "Current branch: $(git branch --show-current)"
          echo "Latest commit: $(git log -1 --oneline)"
          echo "Latest tag: $(git describe --tags --always)"
          echo ""
          echo "📁 Repository structure:"
          ls -lah
          echo ""
          echo "📁 Data directory contents:"
          ls -lah data/ || echo "No data directory"
          echo ""
          echo "📁 Data/uploads directory contents:"
          ls -lah data/uploads/ || echo "No data/uploads directory"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir pandas openpyxl numpy python-dateutil
          echo "✅ Dependencies installed"

      - name: Verify required files
        run: |
          mkdir -p data/uploads
          python scripts/verify_files.py \
            "data/uploads/${{ github.event.inputs.site_master }}" \
            "data/uploads/${{ github.event.inputs.hts_calendar }}" \
            "data/uploads/${{ github.event.inputs.pm_assignments }}" \
            "data/uploads/${{ github.event.inputs.project_sites }}" \
            "data/uploads/${{ github.event.inputs.critical_sites }}" \
            || { echo "❌ File verification failed"; exit 1; }

      - name: Generate April Report
        run: |
          echo "📊 Starting April Report Generation..."
          echo ""
          echo "📁 Files available in data/uploads:"
          ls -lh data/uploads/ || echo "No files found"
          echo ""
          
          python scripts/april_analysis.py \
            --site-master "data/uploads/${{ github.event.inputs.site_master }}" \
            --hts-calendar "data/uploads/${{ github.event.inputs.hts_calendar }}" \
            --pm-assignments "data/uploads/${{ github.event.inputs.pm_assignments }}" \
            --project-sites "data/uploads/${{ github.event.inputs.project_sites }}" \
            --critical-sites "data/uploads/${{ github.event.inputs.critical_sites }}" \
            --output output \
            --report-name "${{ github.event.inputs.output_name }}" \
            || { echo "❌ Script execution failed"; exit 1; }

      - name: Verify Report
        run: |
          if [ -f "output/${{ github.event.inputs.output_name }}" ]; then
            ls -lh output/${{ github.event.inputs.output_name }}
            echo "✅ Report generated successfully"
          else
            echo "❌ Report generation failed"
            exit 1
          fi

      - name: Upload Report
        uses: actions/upload-artifact@v3
        with:
          name: april-report
          path: output/${{ github.event.inputs.output_name }}
          retention-days: 30

      - name: Create Summary
        run: |
          echo "### 📊 April Site Visit Calendar Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Report:** ${{ github.event.inputs.output_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Input Files:**" >> $GITHUB_STEP_SUMMARY
          echo "- Site Master: ${{ github.event.inputs.site_master }}" >> $GITHUB_STEP_SUMMARY
          echo "- HTS Calendar: ${{ github.event.inputs.hts_calendar }}" >> $GITHUB_STEP_SUMMARY
          echo "- PM Assignments: ${{ github.event.inputs.pm_assignments }}" >> $GITHUB_STEP_SUMMARY
          echo "- Project Sites: ${{ github.event.inputs.project_sites }}" >> $GITHUB_STEP_SUMMARY
          echo "- Critical Sites: ${{ github.event.inputs.critical_sites }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Report is ready for download" >> $GITHUB_STEP_SUMMARY
